services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_vlog
      POSTGRES_USER: ai_vlog
      POSTGRES_PASSWORD: ai_vlog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ai_vlog_minio
      MINIO_ROOT_PASSWORD: ai_vlog_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 ai_vlog_minio ai_vlog_minio_secret;
      mc mb -p local/ai-vlog || true;
      mc anonymous set download local/ai-vlog || true;
      "

  api:
    build:
      context: .
      target: api
    env_file: .env
    environment:
      PORT: 8787
      PUBLIC_BASE_URL: http://localhost:8787
      WEB_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ai_vlog:ai_vlog@postgres:5432/ai_vlog?schema=public
      S3_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/ai-vlog
    depends_on:
      - redis
      - postgres
      - minio
      - minio-init
    ports:
      - "8787:8787"
    volumes:
      - api_storage:/app/apps/api/storage

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ai_vlog:ai_vlog@postgres:5432/ai_vlog?schema=public
      S3_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/ai-vlog
    depends_on:
      - api
      - redis
      - postgres
      - minio
      - minio-init
    volumes:
      - api_storage:/app/apps/api/storage

  web:
    build:
      context: .
      target: web
    environment:
      VITE_API_BASE: http://localhost:8787
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  redis_data:
  postgres_data:
  minio_data:
  api_storage:
